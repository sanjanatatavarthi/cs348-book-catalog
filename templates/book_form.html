{% extends 'base.html' %}

{% block content %}
  <h1>{{ form_title }}</h1>

  <form method="post" class="form-card">
    <label>
      Title
      <input type="text" name="title" value="{{ book['title'] if book else '' }}" required>
    </label>

    <label>
      Author
      <input type="text" name="author_name" value="{{ book['author_name'] if book else '' }}" required>
    </label>

    <label>
      Genre
      <select name="genre_id" required>
        <option value="">Select a genre</option>
        {% for genre in genres %}
          {% set selected_genre = book['genre_id']|string if book else '' %}
          <option value="{{ genre['genre_id'] }}" {% if selected_genre == genre['genre_id']|string %}selected{% endif %}>
            {{ genre['name'] }}
          </option>
        {% endfor %}
      </select>
    </label>

    <label>
      User Rating
      <input type="number" step="0.1" min="0" max="5" name="user_rating" value="{{ book['user_rating'] if book and book['user_rating'] is not none else '' }}">
    </label>

    <label>
      Reviews
      <input type="number" min="0" name="reviews" value="{{ book['reviews'] if book and book['reviews'] is not none else '' }}">
    </label>

    <label>
      Price
      <input type="number" step="0.01" min="0" name="price" value="{{ book['price'] if book and book['price'] is not none else '' }}">
    </label>

    <label>
      Year
      <input type="number" min="1900" max="2100" name="year" value="{{ book['year'] if book else '' }}" required>
    </label>

    <div class="button-row">
      <button class="button" type="submit">{{ submit_label }}</button>
      <a class="button secondary" href="{{ url_for('list_books') }}">Cancel</a>
    </div>
  </form>
{% endblock %}
